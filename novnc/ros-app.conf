; === Piper MoveIt Docker — noVNC-safe ROS app program [A1, fixed by review RV3] ===
; Loaded by the base's supervisord via the default
; /etc/supervisor/supervisord.conf `[include] files = /etc/supervisor/conf.d/*.conf`.
; The base regenerates conf.d/supervisord.conf (vnc + novnc, both run as user `ubuntu`)
; at runtime but NEVER touches this file, so they coexist with our ROS app.
;
; CRITICAL (RV3 blocker fix): run as user `ubuntu` with HOME=/home/ubuntu + XAUTHORITY so
; RViz/move_group can AUTHENTICATE to the VNC X display :1 (the MIT cookie lives in
; /home/ubuntu/.Xauthority). Running as root → "Authorization required" → blank desktop.
;
; MODE is injected as an env var; entrypoint.sh reads $MODE (default: mock).
; real mode brings up CAN via passwordless sudo (the base grants user `ubuntu` sudo).
; startsecs=0 so a fast `dev` (exec bash exits when no tty) isn't flagged FATAL.

[program:ros-app]
command=/ros-app-entrypoint.sh
directory=/ws
user=ubuntu
autostart=true
autorestart=unexpected
startsecs=0
startretries=3
priority=600
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
; DISPLAY/HOME/XAUTHORITY let RViz render into the VNC desktop (:1) as user ubuntu; plus locale + mode.
environment=DISPLAY=":1",HOME="/home/ubuntu",XAUTHORITY="/home/ubuntu/.Xauthority",LC_NUMERIC="C",MODE="%(ENV_MODE)s",ARM_TYPE="%(ENV_ARM_TYPE)s",EFFECTOR_TYPE="%(ENV_EFFECTOR_TYPE)s",CAN_IFACE="%(ENV_CAN_IFACE)s",CAN_BITRATE="%(ENV_CAN_BITRATE)s"
